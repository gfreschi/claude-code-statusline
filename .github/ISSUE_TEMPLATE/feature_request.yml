name: Feature Request
description: Suggest a new segment, theme, or capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for the status line? Describe what you'd like and why it would be useful.

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or improvement.
      placeholder: A segment that shows the estimated cost of the current session...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why?
      description: What problem does this solve or what workflow does it improve?
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New segment
        - New theme
        - Enhancement to existing feature
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you thought of other ways to achieve this?
    validations:
      required: false
